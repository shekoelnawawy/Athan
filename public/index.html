<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#6b4f2a">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <title>Vancouver Athan</title>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Vancouver Athan</h1>
        <div id="installBanner" class="install-banner" hidden>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Open in <strong>Safari</strong>, tap <strong>Share</strong> → <strong>Add to Home Screen</strong>, then reopen from your home screen.
        </div>
        <div class="toolbar">
          <button id="enablePush" class="primary">Enable Notifications</button>
          <button id="refreshTimes" class="secondary">Refresh Times</button>
          <span id="status" class="muted">Loading…</span>
        </div>
      </section>

      <section class="grid-card" id="tableCard" aria-live="polite"></section>
      <div class="footer-note" id="lastRefreshed"></div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
